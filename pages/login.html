<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IronCore - Iniciar sesión</title>
  <link rel="stylesheet" href="../css/auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
  <meta name="theme-color" content="#ff6a00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IronCore">
  <link rel="apple-touch-icon" href="../img/icon-192.png">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo" onclick="location.href='../index.html'">IronCore</div>
      <div class="auth-titulo">Iniciar sesión</div>
      <div class="auth-sub">Accedé a tu progreso y rutinas guardadas</div>

      <div id="registro-ok" class="auth-success" style="display:none">
        ✅ Cuenta creada correctamente. Ya podés iniciar sesión.
      </div>

      <div class="auth-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <div class="pass-input-wrap">
            <input type="password" id="login-pass" placeholder="Tu contraseña" autocomplete="current-password">
            <button class="ojo-btn" type="button" onclick="togglePass('login-pass', this)">👁</button>
          </div>
        </div>

        <div id="login-error" class="auth-error" style="display:none"></div>

        <button class="auth-btn" id="loginBtn" onclick="iniciarSesion()">Iniciar sesión</button>

        <div class="auth-divider">¿No tenés cuenta?</div>
        <button class="auth-btn secondary" onclick="location.href='registro.html'">Crear cuenta</button>
        <button class="auth-btn ghost" onclick="location.href='../index.html'">← Volver al inicio</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, signInWithEmailAndPassword, onAuthStateChanged } from '../js/firebase.js';

    onAuthStateChanged(auth, user => {
      if (user) location.href = '../index.html';
    });

    if (new URLSearchParams(window.location.search).get('registro') === 'ok') {
      document.getElementById('registro-ok').style.display = 'block';
    }

    window.togglePass = function(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
      else { input.type = 'password'; btn.textContent = '👁'; }
    };

    window.iniciarSesion = async function() {
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-pass').value;
      const btn   = document.getElementById('loginBtn');
      const err   = document.getElementById('login-error');

      if (!email || !pass) {
        err.textContent = '⚠️ Completá todos los campos';
        err.style.display = 'block';
        return;
      }

      btn.textContent   = 'Ingresando...';
      btn.disabled      = true;
      err.style.display = 'none';

      try {
        await signInWithEmailAndPassword(auth, email, pass);
        location.href = '../index.html';
      } catch (e) {
        btn.textContent = 'Iniciar sesión';
        btn.disabled    = false;
        err.style.display = 'block';

        // Fix punto 3 — Firebase unifica estos errores en invalid-credential
        if (
          e.code === 'auth/invalid-credential' ||
          e.code === 'auth/user-not-found'     ||
          e.code === 'auth/wrong-password'
        ) {
          err.textContent = '⚠️ Email o contraseña incorrectos';
        } else if (e.code === 'auth/invalid-email') {
          err.textContent = '⚠️ El formato del email no es válido';
        } else if (e.code === 'auth/too-many-requests') {
          err.textContent = '⚠️ Demasiados intentos fallidos. Esperá unos minutos.';
        } else if (e.code === 'auth/network-request-failed') {
          err.textContent = '⚠️ Sin conexión. Revisá tu internet.';
        } else {
          err.textContent = '⚠️ Error al iniciar sesión. Intentá de nuevo.';
        }
      }
    };

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') window.iniciarSesion();
    });
  </script>
</body>
</html>
